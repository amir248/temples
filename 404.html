<!DOCTYPE html>
<html lang="ru">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f4ecd8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: #333;
  text-align: center;
}

  font-size: 80px;
  margin: 0;
  color: #d9c7a1;
}

  color: #333;
  padding: 10px 20px;
  border-radius: 5px;

  transition: background 0.3s;

  background-color: #c0ad82;
}

<body>
<div>

</html>
